        --api-key synthia
    cmdStop: docker stop qwen3vl

  "qwen3-next":
    cmd: |
      docker run --gpus='"${gpus}"' --name qwen3-next
        --init --rm -p ${PORT}:8080 -v ${models_directory}:/models ghcr.io/ggml-org/llama.cpp:server-cuda
        --model /models/Qwen3-Next-80B-A3B-Thinking-UD-Q8_K_XL.gguf
        --gpu-layers 999
        --ctx-size 131072
        --temp 0.6
        --top_p 0.95
        --top_k 20
        --min_p 0
        --jinja
        --repeat-penalty 1.05
        --api-key synthia
    cmdStop: docker stop qwen3-next